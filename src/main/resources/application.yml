spring:
  application:
    name: currency-exchange

  datasource:
    url: jdbc:h2:file:./data/db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    cache-names: nbp-rates
    caffeine:
      spec: maximumSize=16,expireAfterWrite=5m

nbp:
  base-url: https://api.nbp.pl/api
  connect-timeout: 3s
  read-timeout: 5s

server:
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.example.currency: INFO
