spring:
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration

  cache:
    type: none

nbp:
  base-url: http://localhost:0
  connect-timeout: 1s
  read-timeout: 2s
